<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0f1226" />
<meta name="description" content="Learn Mandarin Chinese with flashcards, quizzes, tone-colored pinyin, and native audio." />
<title>学中文 — Learn Mandarin</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E5%AD%A6%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header>
    <h1><span class="zh">学中文</span> Learn Mandarin</h1>
    <div class="stats" id="stats">0 / 0</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-panel="learn">Cards</button>
    <button class="tab" data-panel="quiz">Quiz</button>
    <button class="tab" data-panel="browse">Browse</button>
    <button class="tab" data-panel="chat">Chat</button>
  </div>

  <div class="category-row" id="categoryRow"></div>

  <div class="panel active" id="panel-learn">
    <div class="progress-label">
      <span id="learnPos">Card 1</span>
      <span id="learnTotal">of 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="learnProgress" style="width:0%"></div></div>

    <div class="flash-card" id="flashCard">
      <div class="hanzi" id="flHanzi">—</div>
      <div class="pinyin" id="flPinyin"></div>
      <div class="english" id="flEnglish"></div>
      <div class="hint" id="flHint">tap to reveal</div>
    </div>

    <div class="tone-legend">
      <span class="tone-1">1st flat</span>
      <span class="tone-2">2nd rising</span>
      <span class="tone-3">3rd dipping</span>
      <span class="tone-4">4th falling</span>
      <span class="tone-5">neutral</span>
    </div>

    <div class="controls">
      <button class="btn btn-prev" id="btnPrev">← Prev</button>
      <button class="btn btn-audio" id="btnSpeak">🔊 Listen</button>
      <button class="btn btn-next" id="btnNext">Next →</button>
      <button class="btn btn-known btn-full" id="btnKnown">✓ I know this</button>
    </div>
  </div>

  <div class="panel" id="panel-quiz">
    <div class="quiz-score">
      <div><div class="num" id="qCorrect">0</div><div class="lbl">Correct</div></div>
      <div><div class="num" id="qWrong">0</div><div class="lbl">Wrong</div></div>
      <div><div class="num" id="qStreak">0</div><div class="lbl">Streak</div></div>
    </div>

    <div class="quiz-prompt">
      <div class="quiz-q-label" id="quizLabel">Choose the meaning</div>
      <div class="quiz-q" id="quizQ">—</div>
    </div>

    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  </div>

  <div class="panel" id="panel-browse">
    <div class="vocab-list" id="vocabList"></div>
  </div>

  <div class="panel" id="panel-chat">
    <div class="chat-toolbar">
      <div class="chat-status" id="chatStatus">—</div>
      <div class="chat-toolbar-buttons">
        <button class="icon-btn" id="chatClearBtn" title="Clear conversation" aria-label="Clear">🗑</button>
        <button class="icon-btn" id="chatSettingsBtn" title="Settings" aria-label="Settings">⚙</button>
      </div>
    </div>
    <div class="chat-thread" id="chatThread"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Type in Chinese, pinyin, or English…" autocomplete="off" />
      <button class="btn btn-next" id="chatSend">Send</button>
    </div>
  </div>

  <div class="modal" id="chatSettings" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Chat settings</h3>
        <button class="icon-btn" id="settingsClose" aria-label="Close">✕</button>
      </div>
      <label class="field">
        <span>Anthropic API key</span>
        <input type="password" id="apiKeyInput" placeholder="sk-ant-…" autocomplete="off" />
        <small>Stored only in this browser. Sent only to api.anthropic.com.</small>
      </label>
      <label class="field">
        <span>Model</span>
        <select id="modelSelect"></select>
      </label>
      <label class="field">
        <span>Level</span>
        <select id="levelSelect"></select>
      </label>
      <div class="modal-actions">
        <button class="btn btn-next btn-full" id="settingsSave">Save</button>
      </div>
    </div>
  </div>

  <footer>
    Built as a static website &middot; data stays in your browser &middot;
    <a href="flappy.html">play flappy bird →</a>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script src="vocab.js"></script>
<script src="app.js"></script>
<script src="chat.js"></script>
</body>
</html>
