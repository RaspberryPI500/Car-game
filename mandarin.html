<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>学中文 — Learn Mandarin</title>
<style>
  :root {
    --bg: #0f1226;
    --bg-2: #1a1d3a;
    --card: #232752;
    --card-2: #2c3166;
    --text: #f4f5ff;
    --muted: #9aa0c7;
    --accent: #ff5a5f;
    --accent-2: #ffd166;
    --good: #4ade80;
    --bad: #f87171;
    --tone1: #ff6b6b;
    --tone2: #4ade80;
    --tone3: #60a5fa;
    --tone4: #c084fc;
    --tone5: #9aa0c7;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", Roboto, sans-serif;
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }
  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 16px 100px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  header h1 {
    font-size: 22px; margin: 0; letter-spacing: 0.5px;
  }
  header h1 .zh { color: var(--accent-2); margin-right: 6px; }
  .stats {
    font-size: 13px; color: var(--muted);
  }
  .tabs {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 16px;
    background: var(--bg-2); padding: 6px; border-radius: 14px;
  }
  .tab {
    padding: 10px 8px; text-align: center;
    border: none; background: transparent; color: var(--muted);
    font-size: 14px; font-weight: 600; border-radius: 10px;
    cursor: pointer; transition: all .2s ease;
  }
  .tab.active {
    background: var(--card-2); color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .panel { display: none; }
  .panel.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .category-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .chip {
    padding: 8px 14px; border-radius: 999px;
    background: var(--card); color: var(--text);
    border: 1px solid transparent; font-size: 13px;
    cursor: pointer; user-select: none;
    transition: all .15s ease;
  }
  .chip:hover { background: var(--card-2); }
  .chip.active {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }

  .flash-card {
    background: var(--card);
    border-radius: 22px;
    padding: 28px 20px;
    min-height: 320px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    cursor: pointer;
    user-select: none;
    overflow: hidden;
  }
  .flash-card::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 0%, rgba(255,90,95,0.15), transparent 50%),
                radial-gradient(circle at 80% 100%, rgba(255,209,102,0.12), transparent 50%);
    pointer-events: none;
  }
  .hanzi {
    font-size: 92px; line-height: 1;
    letter-spacing: 4px;
    margin-bottom: 18px;
    text-align: center;
    font-weight: 500;
  }
  .pinyin {
    font-size: 26px;
    margin-bottom: 10px;
    letter-spacing: 1px;
    min-height: 32px;
  }
  .english {
    font-size: 18px; color: var(--muted);
    text-align: center;
    min-height: 22px;
  }
  .hint {
    position: absolute; bottom: 12px; left: 0; right: 0;
    text-align: center; font-size: 12px; color: var(--muted);
    opacity: 0.7;
  }
  .tone-1 { color: var(--tone1); }
  .tone-2 { color: var(--tone2); }
  .tone-3 { color: var(--tone3); }
  .tone-4 { color: var(--tone4); }
  .tone-5 { color: var(--tone5); }

  .controls {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-top: 16px;
  }
  .btn {
    padding: 14px;
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform .1s ease, background .15s ease;
    color: #fff;
  }
  .btn:active { transform: scale(0.96); }
  .btn-prev { background: var(--card-2); }
  .btn-audio { background: var(--accent-2); color: #1a1a2e; }
  .btn-next { background: var(--accent); }
  .btn-full { grid-column: 1 / -1; }
  .btn-known { background: var(--good); color: #082b15; }
  .btn-unknown { background: var(--bad); }

  .progress-bar {
    height: 6px; background: var(--card); border-radius: 3px;
    overflow: hidden; margin: 12px 0;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .3s ease;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 4px;
  }

  /* Quiz */
  .quiz-prompt {
    background: var(--card);
    border-radius: 22px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .quiz-q-label {
    font-size: 13px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 12px;
  }
  .quiz-q { font-size: 56px; line-height: 1.1; }
  .quiz-q.small { font-size: 28px; }
  .quiz-options {
    display: grid; gap: 10px;
  }
  .option {
    background: var(--card); color: var(--text);
    border: 2px solid transparent;
    padding: 16px; border-radius: 14px;
    text-align: left; font-size: 17px;
    cursor: pointer; transition: all .15s ease;
  }
  .option:hover { background: var(--card-2); }
  .option.correct { background: rgba(74,222,128,0.2); border-color: var(--good); }
  .option.wrong { background: rgba(248,113,113,0.2); border-color: var(--bad); }
  .option.disabled { pointer-events: none; }
  .quiz-feedback {
    text-align: center; font-size: 16px;
    margin-top: 14px; min-height: 22px; color: var(--muted);
  }
  .quiz-score {
    display: flex; justify-content: space-around;
    background: var(--card); border-radius: 14px;
    padding: 12px; margin-bottom: 12px;
  }
  .quiz-score div { text-align: center; }
  .quiz-score .num { font-size: 22px; font-weight: 700; }
  .quiz-score .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* Browse */
  .vocab-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .vocab-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 12px; align-items: center;
    background: var(--card);
    padding: 12px 14px; border-radius: 12px;
    cursor: pointer;
  }
  .vocab-row .vh { font-size: 28px; }
  .vocab-row .vp { font-size: 14px; }
  .vocab-row .ve { font-size: 13px; color: var(--muted); }
  .vocab-row .speaker {
    background: var(--card-2); border: none;
    color: var(--text); width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer; font-size: 16px;
  }
  .vocab-row .speaker:active { transform: scale(0.9); }

  /* Tone legend */
  .tone-legend {
    display: flex; gap: 8px; margin: 4px 0 14px;
    font-size: 12px; flex-wrap: wrap;
  }
  .tone-legend span {
    padding: 3px 8px; border-radius: 999px;
    background: var(--card);
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--card-2); color: var(--text);
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity .2s ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 380px) {
    .hanzi { font-size: 76px; }
    .quiz-q { font-size: 44px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span class="zh">学中文</span> Learn Mandarin</h1>
    <div class="stats" id="stats">0 / 0</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-panel="learn">Flashcards</button>
    <button class="tab" data-panel="quiz">Quiz</button>
    <button class="tab" data-panel="browse">Browse</button>
  </div>

  <div class="category-row" id="categoryRow"></div>

  <!-- LEARN -->
  <div class="panel active" id="panel-learn">
    <div class="progress-label">
      <span id="learnPos">Card 1</span>
      <span id="learnTotal">of 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="learnProgress" style="width:0%"></div></div>

    <div class="flash-card" id="flashCard">
      <div class="hanzi" id="flHanzi">—</div>
      <div class="pinyin" id="flPinyin"></div>
      <div class="english" id="flEnglish"></div>
      <div class="hint" id="flHint">tap to reveal</div>
    </div>

    <div class="tone-legend">
      <span class="tone-1">1st flat</span>
      <span class="tone-2">2nd rising</span>
      <span class="tone-3">3rd dipping</span>
      <span class="tone-4">4th falling</span>
      <span class="tone-5">neutral</span>
    </div>

    <div class="controls">
      <button class="btn btn-prev" id="btnPrev">← Prev</button>
      <button class="btn btn-audio" id="btnSpeak">🔊 Listen</button>
      <button class="btn btn-next" id="btnNext">Next →</button>
      <button class="btn btn-known btn-full" id="btnKnown">✓ I know this</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="panel" id="panel-quiz">
    <div class="quiz-score">
      <div><div class="num" id="qCorrect">0</div><div class="lbl">Correct</div></div>
      <div><div class="num" id="qWrong">0</div><div class="lbl">Wrong</div></div>
      <div><div class="num" id="qStreak">0</div><div class="lbl">Streak</div></div>
    </div>

    <div class="quiz-prompt">
      <div class="quiz-q-label" id="quizLabel">Choose the meaning</div>
      <div class="quiz-q" id="quizQ">—</div>
    </div>

    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  </div>

  <!-- BROWSE -->
  <div class="panel" id="panel-browse">
    <div class="vocab-list" id="vocabList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

============================================================ */

/* ============================================================
   Tone detection from pinyin marks
============================================================ */
const TONE_MAP = {
  // tone 1
  "ā":1,"ē":1,"ī":1,"ō":1,"ū":1,"ǖ":1,
  // tone 2
  "á":2,"é":2,"í":2,"ó":2,"ú":2,"ǘ":2,
  // tone 3
  "ǎ":3,"ě":3,"ǐ":3,"ǒ":3,"ǔ":3,"ǚ":3,
  // tone 4
  "à":4,"è":4,"ì":4,"ò":4,"ù":4,"ǜ":4
};
function toneOf(syllable) {
  for (const ch of syllable) {
    if (TONE_MAP[ch]) return TONE_MAP[ch];
  }
  return 5; // neutral
}
function colorizePinyin(pinyin) {
  return pinyin.split(/(\s+)/).map(part => {
    if (/^\s+$/.test(part) || part === "" || part === "…") return part;
    const t = toneOf(part);
    return `<span class="tone-${t}">${part}</span>`;
  }).join("");
}

/* ============================================================
   State
============================================================ */
const STORAGE_KEY = "mandarin_learner_v1";
const state = {
  category: "Greetings",
  index: 0,
  revealed: false,
  known: loadKnown(),
  quiz: { correct: 0, wrong: 0, streak: 0, current: null, mode: "h2e" }
};
function loadKnown() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveKnown() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.known));
}
function keyOf(item) { return item.h + "|" + item.e; }

/* ============================================================
   DOM helpers
============================================================ */
const $ = (id) => document.getElementById(id);
function deck() { return VOCAB[state.category]; }
function curItem() { return deck()[state.index]; }

function showToast(msg) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => t.classList.remove("show"), 1400);
}

/* ============================================================
   Speech (Web Speech API)
============================================================ */
let zhVoice = null;
function pickVoice() {
  const voices = speechSynthesis.getVoices();
  zhVoice = voices.find(v => /zh[-_]CN/i.test(v.lang)) ||
            voices.find(v => /zh/i.test(v.lang)) ||
            voices.find(v => /chinese/i.test(v.name)) || null;
}
if ("speechSynthesis" in window) {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text) {
  if (!("speechSynthesis" in window)) {
    showToast("Audio not supported on this browser");
    return;
  }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN";
  u.rate = 0.85;
  if (zhVoice) u.voice = zhVoice;
  speechSynthesis.speak(u);
}

/* ============================================================
   Categories UI
============================================================ */
function renderCategories() {
  const row = $("categoryRow");
  row.innerHTML = "";
  Object.keys(VOCAB).forEach(cat => {
    const b = document.createElement("button");
    b.className = "chip" + (cat === state.category ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      state.category = cat;
      state.index = 0;
      state.revealed = false;
      renderCategories();
      renderLearn();
      renderBrowse();
      nextQuiz();
    };
    row.appendChild(b);
  });
}

/* ============================================================
   Stats
============================================================ */
function updateStats() {
  const all = Object.values(VOCAB).flat();
  const learned = all.filter(it => state.known[keyOf(it)]).length;
  $("stats").textContent = `${learned} / ${all.length} learned`;
}

/* ============================================================
   Flashcards
============================================================ */
function renderLearn() {
  const d = deck();
  const item = curItem();
  $("learnPos").textContent = `Card ${state.index + 1}`;
  $("learnTotal").textContent = `of ${d.length}`;
  $("learnProgress").style.width = `${((state.index + 1) / d.length) * 100}%`;
  $("flHanzi").textContent = item.h;
  if (state.revealed) {
    $("flPinyin").innerHTML = colorizePinyin(item.p);
    $("flEnglish").textContent = item.e;
    $("flHint").textContent = state.known[keyOf(item)] ? "✓ marked as known" : "tap to flip back";
  } else {
    $("flPinyin").textContent = "";
    $("flEnglish").textContent = "";
    $("flHint").textContent = "tap to reveal";
  }
  updateStats();
}

$("flashCard").addEventListener("click", () => {
  state.revealed = !state.revealed;
  renderLearn();
});
$("btnPrev").onclick = (e) => {
  e.stopPropagation();
  state.index = (state.index - 1 + deck().length) % deck().length;
  state.revealed = false;
  renderLearn();
};
$("btnNext").onclick = (e) => {
  e.stopPropagation();
  state.index = (state.index + 1) % deck().length;
  state.revealed = false;
  renderLearn();
};
$("btnSpeak").onclick = (e) => {
  e.stopPropagation();
  speak(curItem().h);
};
$("btnKnown").onclick = (e) => {
  e.stopPropagation();
  const k = keyOf(curItem());
  state.known[k] = !state.known[k];
  saveKnown();
  showToast(state.known[k] ? "Marked as known ✓" : "Unmarked");
  renderLearn();
  renderBrowse();
};

/* ============================================================
   Quiz — multiple choice. Modes alternate:
   - h2e: hanzi → english
   - e2h: english → hanzi
   - p2e: pinyin → english
============================================================ */
function pick(arr, n, exclude) {
  const pool = arr.filter(x => x !== exclude);
  const out = [];
  while (out.length < n && pool.length) {
    const i = Math.floor(Math.random() * pool.length);
    out.push(pool.splice(i, 1)[0]);
  }
  return out;
}
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextQuiz() {
  const d = deck();
  if (d.length < 4) {
    $("quizQ").textContent = "Need at least 4 items";
    $("quizOptions").innerHTML = "";
    return;
  }
  const modes = ["h2e", "e2h", "p2e"];
  const mode = modes[Math.floor(Math.random() * modes.length)];
  const correct = d[Math.floor(Math.random() * d.length)];
  const distractors = pick(d, 3, correct);
  const options = shuffle([correct, ...distractors]);
  state.quiz.current = { correct, options, mode };

  const labels = {
    h2e: "Choose the meaning",
    e2h: "Choose the character",
    p2e: "Choose the meaning"
  };
  $("quizLabel").textContent = labels[mode];
  const q = $("quizQ");
  q.classList.remove("small");
  if (mode === "h2e") {
    q.textContent = correct.h;
  } else if (mode === "e2h") {
    q.textContent = correct.e;
    q.classList.add("small");
  } else {
    q.innerHTML = colorizePinyin(correct.p);
    q.classList.add("small");
  }

  const optsEl = $("quizOptions");
  optsEl.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    if (mode === "e2h") {
      btn.innerHTML = `<span style="font-size:24px;margin-right:8px;">${opt.h}</span>
                       <span style="color:var(--muted);font-size:13px;">${colorizePinyin(opt.p)}</span>`;
    } else {
      btn.textContent = opt.e;
    }
    btn.onclick = () => answerQuiz(btn, opt);
    optsEl.appendChild(btn);
  });
  $("quizFeedback").textContent = "";

  // Speak the prompt automatically for h2e/p2e
  if (mode === "h2e" || mode === "p2e") {
    setTimeout(() => speak(correct.h), 300);
  }
}

function answerQuiz(btn, opt) {
  const cur = state.quiz.current;
  document.querySelectorAll(".option").forEach(b => b.classList.add("disabled"));
  if (opt === cur.correct) {
    btn.classList.add("correct");
    state.quiz.correct++;
    state.quiz.streak++;
    $("quizFeedback").textContent = `✓ ${cur.correct.h} — ${cur.correct.p} — ${cur.correct.e}`;
    // auto-mark items consistently answered
    state.known[keyOf(cur.correct)] = true;
    saveKnown();
  } else {
    btn.classList.add("wrong");
    state.quiz.wrong++;
    state.quiz.streak = 0;
    $("quizFeedback").innerHTML =
      `✗ Correct: <b>${cur.correct.h}</b> — ${colorizePinyin(cur.correct.p)} — ${cur.correct.e}`;
    document.querySelectorAll(".option").forEach(b => {
      if (b.textContent === cur.correct.e || b.innerHTML.includes(cur.correct.h)) {
        b.classList.add("correct");
      }
    });
  }
  $("qCorrect").textContent = state.quiz.correct;
  $("qWrong").textContent = state.quiz.wrong;
  $("qStreak").textContent = state.quiz.streak;
  updateStats();
  setTimeout(nextQuiz, 1500);
}

/* ============================================================
   Browse list
============================================================ */
function renderBrowse() {
  const list = $("vocabList");
  list.innerHTML = "";
  deck().forEach(item => {
    const row = document.createElement("div");
    row.className = "vocab-row";
    const known = state.known[keyOf(item)] ? " ✓" : "";
    row.innerHTML = `
      <div class="vh">${item.h}</div>
      <div>
        <div class="vp">${colorizePinyin(item.p)}</div>
        <div class="ve">${item.e}${known}</div>
      </div>
      <button class="speaker" aria-label="speak">🔊</button>
    `;
    row.querySelector(".speaker").onclick = (e) => {
      e.stopPropagation();
      speak(item.h);
    };
    row.onclick = () => {
      state.known[keyOf(item)] = !state.known[keyOf(item)];
      saveKnown();
      renderBrowse();
      updateStats();
      showToast(state.known[keyOf(item)] ? "Marked as known ✓" : "Unmarked");
    };
    list.appendChild(row);
  });
}

/* ============================================================
   Tabs
============================================================ */
document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    const which = tab.dataset.panel;
    $("panel-" + which).classList.add("active");
    if (which === "quiz") nextQuiz();
    if (which === "browse") renderBrowse();
    if (which === "learn") renderLearn();
  };
});

/* ============================================================
   Keyboard shortcuts (desktop)
============================================================ */
document.addEventListener("keydown", (e) => {
  const learnActive = $("panel-learn").classList.contains("active");
  if (!learnActive) return;
  if (e.key === "ArrowLeft") $("btnPrev").click();
  else if (e.key === "ArrowRight") $("btnNext").click();
  else if (e.key === " ") { e.preventDefault(); $("flashCard").click(); }
  else if (e.key.toLowerCase() === "s") $("btnSpeak").click();
});

/* ============================================================
   Init
============================================================ */
renderCategories();
renderLearn();
renderBrowse();
updateStats();
</script>
</body>
</html>
